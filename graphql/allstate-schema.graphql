}

"""Comprehensive coverage for non-collision losses."""
type Comprehensive {
  id: ID!
  policyId: ID!
  deductible: Deductible!
  annualPremium: Decimal!
  glassDeductibleWaiver: Boolean
}

"""Coverage for accidents involving drivers without insurance."""
type UninsuredMotorist {
  id: ID!
  policyId: ID!
  limitPerPerson: Decimal!
  limitPerOccurrence: Decimal!
  annualPremium: Decimal!
  includesPropertyDamage: Boolean
}

"""Coverage when the at-fault driver has insufficient policy limits."""
type UnderinsuredMotorist {
  id: ID!
  policyId: ID!
  limitPerPerson: Decimal!
  limitPerOccurrence: Decimal!
  annualPremium: Decimal!
}

"""Medical payments coverage for occupants regardless of fault."""
type MedicalPayments {
  id: ID!
  policyId: ID!
  limitPerPerson: Decimal!
  annualPremium: Decimal!
}

"""Rental car reimbursement coverage."""
type RentalCoverage {
  id: ID!
  policyId: ID!
  dailyLimit: Decimal!
  occurrenceLimit: Decimal!
  annualPremium: Decimal!
}

"""Roadside assistance and towing coverage."""
type TowingCoverage {
  id: ID!
  policyId: ID!
  perOccurrenceLimit: Decimal!
  annualPremium: Decimal!
}

"""Aggregate container for all home-line coverages."""
type HomeCoverage {
  policyId: ID!
  dwelling: Dwelling
  otherStructures: OtherStructures
  personalProperty: PersonalProperty
  lossOfUse: LossOfUse
  personalLiability: PersonalLiability
