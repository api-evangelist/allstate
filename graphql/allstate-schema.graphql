# ─────────────────────────────────────────────
# Coverage Types
# ─────────────────────────────────────────────

"""Base coverage with shared limit, deductible, and premium fields."""
type Coverage {
  id: ID!
  policyId: ID!
  type: CoverageType!
  limitPerOccurrence: Decimal
  limitAggregate: Decimal
  deductible: Deductible
  annualPremium: Decimal!
  isActive: Boolean!
}

"""Aggregate container for all auto coverages on a policy."""
type AutoCoverage {
  policyId: ID!
  bodilyInjury: BodilyInjury
  propertyDamage: PropertyDamage
  collision: Collision
  comprehensive: Comprehensive
  uninsuredMotorist: UninsuredMotorist
  underinsuredMotorist: UnderinsuredMotorist
  medicalPayments: MedicalPayments
  rental: RentalCoverage
  towing: TowingCoverage
}

"""Bodily injury liability with per-person and per-occurrence limits."""
type BodilyInjury {
  id: ID!
  policyId: ID!
  limitPerPerson: Decimal!
  limitPerOccurrence: Decimal!
  annualPremium: Decimal!
}

"""Property damage liability coverage limit."""
type PropertyDamage {
  id: ID!
  policyId: ID!
