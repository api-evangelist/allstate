# ─────────────────────────────────────────────
# Queries
# ─────────────────────────────────────────────

type Query {
  """Retrieve a policy by its ID."""
  policy(id: ID!): Policy

  """Retrieve a policy by policy number."""
  policyByNumber(policyNumber: String!): Policy

  """Retrieve an auto policy with full driver and vehicle details."""
  autoPolicy(id: ID!): AutoPolicy

  """Retrieve a home policy with dwelling and coverage details."""
  homePolicy(id: ID!): HomePolicy

  """Retrieve a life policy."""
  lifePolicy(id: ID!): LifePolicy

  """Retrieve a renters policy."""
  rentersPolicy(id: ID!): RentersPolicy

  """Retrieve a condo policy."""
  condoPolicy(id: ID!): CondoPolicy

  """Retrieve a motorcycle policy."""
  motorcyclePolicy(id: ID!): MotorcyclePolicy

  """Retrieve a boat policy."""
  boatPolicy(id: ID!): BoatPolicy

  """Retrieve a business policy."""
  businessPolicy(id: ID!): BusinessPolicy

  """Look up a policyholder by ID."""
  policyHolder(id: ID!): PolicyHolder

  """List all policies for a given policyholder."""
  policiesForHolder(holderId: ID!): [Policy!]

  """Look up a driver by ID."""
  driver(id: ID!): Driver

  """Look up a vehicle by ID."""
  vehicle(id: ID!): Vehicle

  """Decode a VIN number."""
  decodeVIN(vin: String!): VIN

  """Get a Motor Vehicle Record for a driver."""
  mvrRecord(driverId: ID!): MVRRecord

  """Get a rate quote by quote number."""
  rateQuote(quoteNumber: String!): RateQuote

  """Retrieve a claim by its ID."""
  claim(id: ID!): Claim

  """Retrieve a claim by claim number."""
  claimByNumber(claimNumber: String!): Claim

  """List claims for a policy."""
  claimsForPolicy(policyId: ID!): [Claim!]

  """Get the current Drivewise enrollment for a policy."""
  drivewise(policyId: ID!): Drivewise

  """List trip reports for a Drivewise enrollment."""
  tripReports(drivewiseId: ID!, limit: Int, offset: Int): [TripReport!]

  """Locate nearby agents by zip code."""
  agentsByZip(zip: String!, radiusMiles: Float): AgentLocator

  """Locate nearby agents by lat/lng coordinates."""
  agentsByLocation(lat: Float!, lng: Float!, radiusMiles: Float): AgentLocator

  """Find a specific agent by ID."""
  agent(id: ID!): Agent

  """Find nearby Good Hands Repair shops by zip code."""
  repairShopsByZip(zip: String!, radiusMiles: Float): [GoodHandsRepair!]
}

# ─────────────────────────────────────────────
# Mutations
# ─────────────────────────────────────────────

input AddressInput {
  line1: String!
  line2: String
  city: String!
  state: String!
  zip: String!
  country: String
}

input PolicyHolderInput {
  firstName: String!
  lastName: String!
  dateOfBirth: Date!
  gender: GenderCode
  maritalStatus: MaritalStatus
  email: String!
  phone: String!
  address: AddressInput!
}

input DriverInput {
  firstName: String!
  lastName: String!
  dateOfBirth: Date!
  gender: GenderCode
  licenseNumber: String!
  licenseState: String!
}

input VehicleInput {
  vin: String!
  use: VehicleUse!
  annualMileage: Int
  garageZip: String
}

input AutoQuoteInput {
  policyHolder: PolicyHolderInput!
  drivers: [DriverInput!]!
  vehicles: [VehicleInput!]!
  effectiveDate: Date!
  coveragePreferences: JSON
}

input HomeQuoteInput {
  policyHolder: PolicyHolderInput!
  propertyAddress: AddressInput!
  yearBuilt: Int!
  squareFootage: Int!
  effectiveDate: Date!
  coveragePreferences: JSON
}

input ClaimInput {
  policyId: ID!
  dateOfLoss: Date!
  description: String!
  lossLocation: AddressInput
  reportedBy: String
}

type Mutation {
  """Request a new auto insurance rate quote."""
  requestAutoQuote(input: AutoQuoteInput!): RateQuote

  """Request a new home insurance rate quote."""
  requestHomeQuote(input: HomeQuoteInput!): RateQuote

  """Bind a policy from an approved rate quote."""
  bindPolicy(quoteNumber: String!, paymentMethod: String!): Policy

  """Add a driver to an existing auto policy."""
  addDriver(policyId: ID!, driver: DriverInput!): Driver

  """Remove a driver from an auto policy."""
  removeDriver(policyId: ID!, driverId: ID!): Boolean

  """Add a vehicle to an existing auto policy."""
  addVehicle(policyId: ID!, vehicle: VehicleInput!): Vehicle

  """Remove a vehicle from an auto policy."""
  removeVehicle(policyId: ID!, vehicleId: ID!): Boolean

  """Update the coverage limits on a policy."""
  updateCoverage(policyId: ID!, coverageUpdates: JSON!): Policy

  """File a new insurance claim."""
  fileClaim(input: ClaimInput!): Claim

  """Upload a document to an existing claim."""
  uploadClaimDocument(claimId: ID!, documentType: String!, fileBase64: String!): Boolean

  """Enroll a policy in the Drivewise telematics program."""
  enrollDrivewise(policyId: ID!, deviceType: String): Drivewise

  """Unenroll a policy from Drivewise."""
  unenrollDrivewise(policyId: ID!): Boolean

  """Issue an OAuth access token."""
  issueToken(clientId: String!, clientSecret: String!, scope: String): Token

  """Revoke an OAuth access token."""
  revokeToken(accessToken: String!): Boolean
}
