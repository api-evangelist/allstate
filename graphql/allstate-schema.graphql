"""
Allstate Insurance - Conceptual GraphQL Schema
Provider: Allstate Insurance (https://www.allstate.com/)
GitHub: https://github.com/Allstate

Covers policy management, coverage configuration, driver and vehicle tracking,
Drivewise telematics, claims handling, repair coordination, and agent location.
"""

# ─────────────────────────────────────────────
# Scalars
# ─────────────────────────────────────────────

scalar Date
scalar DateTime
scalar Decimal
scalar JSON

# ─────────────────────────────────────────────
# Enums
# ─────────────────────────────────────────────

enum PolicyLine {
  AUTO
  HOME
  LIFE
  RENTERS
  CONDO
  MOTORCYCLE
  BOAT
  BUSINESS
}

enum PolicyStatus {
  ACTIVE
  PENDING
  CANCELLED
  EXPIRED
  LAPSED
  IN_RENEWAL
}

enum ClaimStatusCode {
  REPORTED
  ASSIGNED
  UNDER_INVESTIGATION
  ESTIMATE_PENDING
  REPAIR_IN_PROGRESS
  PAYMENT_ISSUED
  CLOSED
  DENIED
}

enum VehicleUse {
  PLEASURE
  COMMUTE
  BUSINESS
  FARM
}

enum CoverageType {
  BODILY_INJURY
  PROPERTY_DAMAGE
  COLLISION
  COMPREHENSIVE
  UNINSURED_MOTORIST
  UNDERINSURED_MOTORIST
  MEDICAL_PAYMENTS
  RENTAL
  TOWING
  DWELLING
  OTHER_STRUCTURES
  PERSONAL_PROPERTY
  LOSS_OF_USE
  PERSONAL_LIABILITY
  GUEST_MEDICAL
}

enum DiscountType {
  SAFE_DRIVER
  MULTI_POLICY
  GOOD_STUDENT
  NEW_CAR
  ANTI_THEFT
  DRIVEWISE
  PAID_IN_FULL
  EARLY_SIGNING
  LOYALTY
  HOMEOWNER
}

enum LicenseStatus {
  VALID
  SUSPENDED
  REVOKED
  EXPIRED
  SURRENDERED
}

enum RepairStatus {
  SCHEDULED
  IN_PROGRESS
  WAITING_FOR_PARTS
  QUALITY_REVIEW
  COMPLETED
  CUSTOMER_PICKUP
}

enum GenderCode {
  M
  F
  X
  UNDISCLOSED
}

enum MaritalStatus {
  SINGLE
  MARRIED
  DIVORCED
  WIDOWED
  DOMESTIC_PARTNER
}

# ─────────────────────────────────────────────
# Address and Contact
# ─────────────────────────────────────────────

type Address {
  line1: String!
  line2: String
  city: String!
  state: String!
  zip: String!
  country: String
}

type PhoneNumber {
  number: String!
  type: String
  primary: Boolean
}

type GeoLocation {
  latitude: Float!
  longitude: Float!
}

# ─────────────────────────────────────────────
# Policy Holder and Insured Parties
# ─────────────────────────────────────────────

"""Account owner responsible for the policy and premium payments."""
type PolicyHolder {
  id: ID!
  firstName: String!
  lastName: String!
  dateOfBirth: Date!
  gender: GenderCode
  maritalStatus: MaritalStatus
  email: String!
  phones: [PhoneNumber!]
  address: Address!
  ssn: String
  policies: [Policy!]
  namedInsureds: [NamedInsured!]
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Person listed on the declarations page as an insured."""
type NamedInsured {
  id: ID!
  policyId: ID!
  firstName: String!
  lastName: String!
  dateOfBirth: Date!
  relationship: String
  isPrimary: Boolean!
}

"""Third party added to a policy with limited coverage rights."""
type AdditionalInsured {
  id: ID!
  policyId: ID!
  name: String!
  address: Address
  interestType: String
  effectiveDate: Date!
  expirationDate: Date
}

